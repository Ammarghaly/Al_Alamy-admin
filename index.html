<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم | مطعم العالمي</title>
  
  <meta name="description" content="البوابة الخاصة بإدارة منتجات وتصنيفات مطعم العالمي. تحكم كامل، سرعة في الأداء، وأمان عالي." />
  
  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://al-alamy-admin.vercel.app/" />
  <meta property="og:title" content="لوحة إدارة مطعم العالمي 🛡️" />
  <meta property="og:description" content="منصة الإدارة الخاصة بمطعم العالمي. إضافة، تعديل، وحذف المنتجات بسهولة." />
  <meta property="og:image" content="https://al-alamy-admin.vercel.app/icon-512.png" />
  
  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://al-alamy-admin.vercel.app/" />
  <meta property="twitter:title" content="لوحة إدارة مطعم العالمي 🛡️" />
  <meta property="twitter:description" content="منصة الإدارة الخاصة بمطعم العالمي. إضافة، تعديل، وحذف المنتجات بسهولة." />
  <meta property="twitter:image" content="https://al-alamy-admin.vercel.app/icon-512.png" />
  
  <link rel="stylesheet" href="styles.css?v=4.0" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
  
  <!-- PWA Meta Tags -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#b22222" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png?v=4.0" />
  <link rel="icon" type="image/png" href="icon-192.png?v=4.0" />

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.log('Service Worker registration failed', err));
      });
    }
  </script>
</head>
<body>

  <!-- Admin Auth Overlay -->
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-card">
      <img src="icon-192.png?v=4.0" alt="Al-Alamy Logo" style="width: 80px; height: 80px; margin-bottom: 20px; border-radius: 15px; border: 1.5px solid var(--primary); box-shadow: var(--glow);" />
      <h2 style="color: var(--primary); margin-bottom: 20px;">دخول الإدارة</h2>
      <input type="password" id="adminPass" placeholder="ادخل كود الدخول..." style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; text-align: center; color: white; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--primary);" />
      <button class="btn btn-primary" id="loginBtn">دخول</button>
    </div>
  </div>

  <div class="app-container" id="adminDashboard" style="display: none;">
    <header class="admin-header">
      <div class="logo-group">
        <img src="icon-192.png?v=4.0" alt="Al-Alamy Logo" class="header-logo" style="width: 50px; height: 50px;" />
        <div>
          <div class="title-logo">لوحة التحكم</div>
          <div class="subtitle">مطعم العالمي - إدارة المنيو</div>
        </div>
      </div>
      <a href="index.html" class="btn btn-edit" style="font-size: 13px;">عرض المنيو 👁️</a>
    </header>

    <main>
      <section class="form-container">
        <h3 id="formTitle" style="color: var(--primary); margin-bottom: 20px;">إضافة طبق جديد</h3>
        <form id="productForm">
          <input type="hidden" id="productId" />
          
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
            <div class="input-group">
              <label>اسم الطبق</label>
              <input type="text" id="pName" placeholder="مثال: كشري مخصوص" required />
            </div>
            <div class="input-group">
              <label>السعر (ج.م)</label>
              <input type="number" id="pPrice" placeholder="25" required />
            </div>
            <div class="input-group">
              <div class="label-with-btn">
                <label>التصنيف</label>
                <button type="button" id="openCatModal" class="add-cat-btn" title="إضافة تصنيف جديد">+</button>
              </div>
              <select id="pCategorySelect" required>
                <option value="" disabled selected>اختر التصنيف...</option>
                <option value="سندوتشات">سندوتشات</option>
                <option value="ميكسات">ميكسات</option>
                <option value="إضافات">إضافات</option>
              </select>
            </div>
          </div>



          <div class="action-btns">
            <button type="submit" class="btn btn-primary" id="submitBtn">حفظ الطبق</button>
            <button type="button" class="btn btn-edit" id="cancelBtn" style="display: none;">إلغاء التعديل</button>
          </div>
        </form>
      </section>

      <section style="margin-bottom: 40px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
          <h3 style="border-right: 4px solid var(--secondary); padding-right: 15px; margin: 0;">التصنيفات الحالية</h3>
          <button type="button" class="btn btn-primary" style="width: auto; font-size: 13px; padding: 10px 15px;" id="openCatModalTop">+ اضافة قسم جديد</button>
        </div>
        <div id="adminCategoriesGrid" class="products-grid" style="grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px;">
          <!-- Categories list -->
        </div>
      </section>

      <section>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px;">
          <h3 style="border-right: 4px solid var(--primary); padding-right: 15px; margin: 0;">الأطباق الحالية</h3>
          <div style="position: relative; flex: 1; max-width: 300px;">
            <input type="text" id="adminSearch" placeholder="بحث باسم الطبق أو التصنيف..." style="width: 100%; padding: 10px 15px; border-radius: 8px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);" />
          </div>
        </div>
        <div id="adminProductsGrid" class="products-grid">
          <!-- Admin product list will be injected here -->
        </div>
      </section>
    </main>
  </div>

  <div id="catModal" class="modal-overlay">
    <div class="modal-content">
      <h3 class="modal-title" id="catModalTitle">إضافة تصنيف جديد</h3>
      <input type="hidden" id="editCatId" />
      <input type="text" id="newCatName" placeholder="اسم التصنيف (مثال: مشروبات)" style="width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 8px; background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1);" />
      
      <label style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 14px;">صورة التصنيف الجديد</label>
      <input type="file" id="cImage" accept="image/*" style="margin-bottom: 10px; color: white; width: 100%;" />
      <div id="cPreviewBox" class="preview-box" style="margin-bottom: 15px; border: 1px dashed var(--primary); padding: 10px; border-radius: 8px; text-align: center;">
        <span style="color: var(--text-muted);">المعاينة تظهر هنا</span>
      </div>
      <input type="hidden" id="cImageUrl" />
      
      <div class="modal-actions">
        <button type="button" id="saveCatBtn" class="btn btn-primary">حفظ</button>
        <button type="button" id="closeCatBtn" class="btn btn-edit">إلغاء</button>
      </div>
    </div>
  </div>

  <!-- PWA Install Popup -->
  <div id="installPopup" class="install-popup hidden">
    <div class="install-info">
      <img src="icon-192.png?v=4.0" class="install-logo" alt="Logo" />
      <div class="install-text">
        <h4>تثبيت لوحة الإدارة</h4>
        <p>وصول أسرع لإدارة المنيو من الشاشة الرئيسية!</p>
      </div>
    </div>
    <div class="install-actions">
      <button class="btn btn-primary" id="installBtn">تثبيت الآن</button>
      <button class="btn btn-edit" id="closeInstall">لاحقاً</button>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>
</html>
